version: '3.8'

services:
  backend:
    build: .
    container_name: dealpam-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000

      # Database (Supabase)
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}

      # JWT
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-2h}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN:-30d}

      # URLs
      - FRONTEND_URL=${FRONTEND_URL}
      - ADMIN_URL=${ADMIN_URL}

      # Cloudflare R2
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}
      - R2_ENDPOINT=${R2_ENDPOINT}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL}

      # SMTP
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}

      # MonCash
      - MONCASH_MODE=${MONCASH_MODE:-live}
      - MONCASH_CLIENT_ID=${MONCASH_CLIENT_ID}
      - MONCASH_CLIENT_SECRET=${MONCASH_CLIENT_SECRET}
      - MONCASH_BUSINESS_KEY=${MONCASH_BUSINESS_KEY}
      - MONCASH_RSA_PUBLIC_KEY=${MONCASH_RSA_PUBLIC_KEY}
      - MONCASH_PAYOUT_ENABLED=${MONCASH_PAYOUT_ENABLED:-false}
      - MONCASH_RETURN_URL=${MONCASH_RETURN_URL}

      # Web Push VAPID
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}

      # Supabase SDK (optionnel)
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}

      # Admin bootstrap
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_CREATE_PIN=${ADMIN_CREATE_PIN}

    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: dealpam-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: dealpam-network
